<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanisha's Sanctuary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hud">
        <div class="currency">⭐ <span id="star-count">0</span></div>
        <div class="level-indicator">Level <span id="level-num">1</span></div>
    </div>

    <div id="garden-screen" class="screen active">
        <div id="garden-map">
            </div>
        <button class="main-btn" onclick="goToLevel()">PLAY LEVEL</button>
        <div id="vent-trigger" onclick="openVent()">🐚</div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <button class="back-btn" onclick="goToGarden()">⬅ Exit</button>
            <h2 id="target-text">Match 3 to win!</h2>
        </div>
        <div id="grid-container">
            <div id="grid"></div>
        </div>
    </div>

    <div id="starfish-dialogue" class="dialogue-container">
        <div class="starfish-avatar">⭐</div> <div class="bubble">
            <p id="starfish-text">Hey Tanisha! Ready to build our garden?</p>
        </div>
    </div>

    <div id="vent-overlay" class="overlay">
        <div class="vent-card">
            <button class="close-btn" onclick="closeVent()">×</button>
            <h3>The Echo Shell</h3>
            <textarea id="vent-input" placeholder="Tell me anything..."></textarea>
            <button class="main-btn" onclick="sendVent()">Release</button>
            <p id="vent-reply" class="hidden"></p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
