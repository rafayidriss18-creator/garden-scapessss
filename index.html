<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Sanctuary Garden</title>
    <style>
        :root {
            --primary: #ffc0cb; /* Baby Pink */
            --secondary: #ffffe0; /* Light Yellow */
            --accent: #8b0000; /* Dark Red */
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fffaf0; text-align: center; }
        #game-container { max-width: 600px; margin: auto; padding: 20px; }
        
        /* Progress Bar */
        .stats { display: flex; justify-content: space-around; background: var(--secondary); padding: 10px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); }
        
        /* The Garden View */
        .garden-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .spot { height: 100px; border: 2px dashed #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #eee; }
        .unlocked { background: var(--primary) !important; border: 2px solid var(--accent) !important; color: white; font-weight: bold; }

        /* Puzzle Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .card { height: 70px; background: var(--accent); border-radius: 8px; cursor: pointer; color: transparent; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .card.flipped { background: var(--secondary); color: black; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Our Garden</h1>
    <div class="stats">
        <span>⭐ Stars: <span id="star-count">0</span></span>
        <span>🌹 Milestones: <span id="milestone-count">0/4</span></span>
    </div>

    <div class="garden-area">
        <div id="spot1" class="spot">???</div>
        <div id="spot2" class="spot">???</div>
        <div id="spot3" class="spot">???</div>
        <div id="spot4" class="spot">???</div>
    </div>

    <button onclick="buyRenovation()" id="renovate-btn">Renovate (2 Stars)</button>

    <hr>
    <h3>Play to earn Stars</h3>
    <div class="grid" id="puzzle-grid"></div>
</div>

<script>
    // Game State & Persistence
    let gameState = JSON.parse(localStorage.getItem('gardenGame')) || {
        stars: 0,
        unlockedCount: 0
    };

    const milestones = ["First Movie Night", "Aug 16: First Kiss", "Our Song Found", "Digital Sanctuary"];

    function updateUI() {
        document.getElementById('star-count').innerText = gameState.stars;
        document.getElementById('milestone-count').innerText = `${gameState.unlockedCount}/4`;
        for(let i=1; i <= gameState.unlockedCount; i++) {
            let spot = document.getElementById(`spot${i}`);
            spot.classList.add('unlocked');
            spot.innerText = milestones[i-1];
        }
        localStorage.setItem('gardenGame', JSON.stringify(gameState));
    }

    // Spending Stars
    function buyRenovation() {
        if (gameState.stars >= 2 && gameState.unlockedCount < 4) {
            gameState.stars -= 2;
            gameState.unlockedCount++;
            updateUI();
        } else if (gameState.unlockedCount >= 4) {
            alert("The garden is fully bloomed! I love you.");
        } else {
            alert("Keep playing to earn more stars!");
        }
    }

    // Simple Match Game Logic
    const icons = ['🌸', '⭐', '🧸', '🍦', '🌸', '⭐', '🧸', '🍦'];
    let flippedCards = [];
    
    function createGrid() {
        const grid = document.getElementById('puzzle-grid');
        icons.sort(() => 0.5 - Math.random());
        icons.forEach((icon, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.icon = icon;
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
            card.classList.add('flipped');
            card.innerText = card.dataset.icon;
            flippedCards.push(card);
        }
        if (flippedCards.length === 2) {
            setTimeout(checkMatch, 500);
        }
    }

    function checkMatch() {
        if (flippedCards[0].dataset.icon === flippedCards[1].dataset.icon) {
            gameState.stars++;
            updateUI();
        } else {
            flippedCards.forEach(c => { c.classList.remove('flipped'); c.innerText = ''; });
        }
        flippedCards = [];
    }

    createGrid();
    updateUI();
</script>

</body>
</html>
