<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Eternal Garden</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loading-screen">Preparing Our World...</div>

    <div class="hud">
        <div class="stat-pill">⭐ <span id="star-count">0</span></div>
        <div class="stat-pill">❤️ <span id="level-num">1</span></div>
    </div>

    <div id="garden-screen" class="screen active">
        <div id="garden-viewport">
            <div id="garden-background">
                </div>
        </div>
        
        <div class="ui-bottom">
            <button class="garden-btn" onclick="openShop()">🏗️ Decorate</button>
            <button class="play-btn" onclick="goToLevel()">PLAY</button>
            <button class="vent-btn" onclick="openVent()">🐚</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-ui">
            <button onclick="goToGarden()">Back</button>
            <div id="score-display">Pops: 0</div>
        </div>
        <div id="grid-wrapper">
            <div id="grid"></div>
        </div>
    </div>

    <div id="shop-overlay" class="overlay">
        <div class="shop-card">
            <h2>Build Our Future</h2>
            <div id="milestone-list"></div>
            <button class="close-btn" onclick="closeShop()">Close</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
